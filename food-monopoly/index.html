<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>美食大富翁 · 北港×水林×口湖</title>
<style>
:root{
  --green:#5aa544;--greend:#3d7a2c;--greenl:#eaf7e1;
  --red:#e0533d;--orange:#f0972b;--blue:#3a86c8;--purple:#8b5cf6;
  --cream:#fdf6e6;--card:#fffdf7;--ink:#3a3226;--muted:#8a7f6d;
  --line:#e7dcc4;--gold:#e6b422;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:'Microsoft JhengHei','PingFang TC','Noto Sans TC',system-ui,sans-serif;
  background:radial-gradient(circle at 20% 10%,#f4fbe9,var(--cream));color:var(--ink);
  min-height:100vh;overflow-x:hidden;}
.wrap{max-width:640px;margin:0 auto;padding:10px 10px 30px;}
h1{font-size:1.5rem;text-align:center;line-height:1.1;}
.brand{display:flex;flex-direction:column;align-items:center;gap:4px;margin:6px 0 10px;}
.brand .towns{font-size:.8rem;font-weight:700;color:var(--greend);letter-spacing:1px;}
.brand .title{font-size:1.9rem;font-weight:900;letter-spacing:2px;}
.brand .title span:nth-child(1){color:var(--red);}
.brand .title span:nth-child(2){color:var(--orange);}
.brand .title span:nth-child(3){color:var(--green);}
.brand .title span:nth-child(4){color:var(--blue);}
.brand .sub{font-size:.74rem;color:var(--muted);}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;
  box-shadow:0 4px 16px rgba(120,90,30,.08);margin-bottom:12px;}
.btn{border:none;border-radius:12px;padding:11px 16px;font-size:.95rem;font-weight:800;
  font-family:inherit;cursor:pointer;color:#fff;background:var(--green);transition:transform .08s,filter .15s;}
.btn:active{transform:scale(.96);}
.btn:disabled{opacity:.5;cursor:default;}
.btn.o{background:var(--orange);}.btn.b{background:var(--blue);}.btn.r{background:var(--red);}
.btn.ghost{background:#fff;color:var(--greend);border:2px solid var(--green);}
.btn.big{width:100%;padding:15px;font-size:1.1rem;border-radius:14px;}
.row{display:flex;gap:8px;flex-wrap:wrap;}
.hidden{display:none!important;}
label{font-size:.85rem;font-weight:700;color:var(--greend);}
input[type=text]{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:10px;font-size:1rem;font-family:inherit;background:#fff;}
.seg{display:flex;gap:6px;flex-wrap:wrap;}
.seg .opt{flex:1;min-width:56px;text-align:center;padding:9px 6px;border:2px solid var(--line);border-radius:11px;
  font-weight:800;cursor:pointer;background:#fff;color:var(--muted);}
.seg .opt.on{border-color:var(--green);color:var(--greend);background:var(--greenl);}
.tokpick{display:flex;gap:8px;flex-wrap:wrap;}
.tokpick .t{font-size:1.5rem;width:46px;height:46px;display:grid;place-items:center;border:2px solid var(--line);border-radius:50%;cursor:pointer;background:#fff;}
.tokpick .t.on{border-color:var(--green);background:var(--greenl);transform:scale(1.08);}
.hint{font-size:.76rem;color:var(--muted);line-height:1.5;}
/* board */
#board{display:grid;gap:3px;aspect-ratio:9/7;width:100%;margin:0 auto;}
.sq{position:relative;border-radius:8px;background:#fff;border:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2px;overflow:hidden;min-height:0;text-align:center;}
.sq .emo{font-size:min(4.2vw,26px);line-height:1;}
.sq .nm{font-size:min(2.3vw,11px);font-weight:700;line-height:1.05;margin-top:1px;color:var(--ink);}
.sq .val{position:absolute;top:1px;left:2px;font-size:min(2.2vw,10px);font-weight:900;color:var(--orange);}
.sq.temple{background:#fdeede;border-color:#f2c98a;}
.sq.chance{background:#e6f0fb;border-color:#a9cdee;}
.sq.luck{background:#fdeaf0;border-color:#f3aac6;}
.sq.start{background:linear-gradient(135deg,#fbe38a,#f0972b);border:none;color:#fff;}
.sq.start .nm{color:#fff;}
.sq.mine{outline:3px solid var(--green);outline-offset:-1px;}
.sq .toks{position:absolute;bottom:1px;right:1px;display:flex;flex-wrap:wrap;gap:0;max-width:70%;justify-content:flex-end;}
.sq .toks span{font-size:min(3vw,16px);line-height:.9;}
.sq.got::after{content:"✓";position:absolute;top:1px;right:3px;color:var(--green);font-weight:900;font-size:min(3vw,14px);}
.center-cell{grid-row:2/7;grid-column:2/9;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#f4fbe9,#eaf7e1);border-radius:14px;border:1px dashed #b9d99a;padding:6px;gap:6px;}
/* turn / dice */
.turnbar{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.pchip{display:flex;align-items:center;gap:6px;font-weight:800;font-size:.95rem;}
.pchip .dot{width:14px;height:14px;border-radius:50%;}
.dice{display:flex;gap:10px;justify-content:center;margin:2px 0;}
.blk{width:clamp(38px,13vw,58px);height:clamp(38px,13vw,58px);border-radius:14px;display:grid;place-items:center;
  font-size:clamp(20px,7vw,30px);background:#8a5a2b;color:#fff;box-shadow:inset 0 -4px 0 rgba(0,0,0,.2);}
.blk.up{background:#c98a4a;}.blk.rolling{animation:sh .25s linear infinite;}
@keyframes sh{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-5px) rotate(-8deg)}75%{transform:translateY(3px) rotate(8deg)}}
.rollres{font-size:1.05rem;font-weight:900;text-align:center;min-height:1.3em;}
.rollres .sheng{color:var(--green);}.rollres .xiao{color:var(--orange);}.rollres .yin{color:var(--red);}
/* players panel */
.plist{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pcard{border:1.5px solid var(--line);border-radius:12px;padding:8px;background:#fff;font-size:.8rem;}
.pcard.active{border-color:var(--green);background:var(--greenl);box-shadow:0 0 0 2px rgba(90,165,68,.2);}
.pcard .ph{display:flex;align-items:center;gap:5px;font-weight:800;margin-bottom:3px;}
.pcard .stat{display:flex;justify-content:space-between;color:var(--muted);font-size:.72rem;}
.pcard .foods{margin-top:4px;font-size:.95rem;line-height:1.2;min-height:1.2em;word-break:break-all;}
.pcard .cards{margin-top:3px;font-size:.72rem;font-weight:800;}
.bar{height:6px;border-radius:3px;background:var(--line);overflow:hidden;margin-top:4px;}
.bar>i{display:block;height:100%;background:var(--green);border-radius:3px;transition:width .3s;}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(40,30,10,.55);display:grid;place-items:center;padding:16px;z-index:50;}
.modal{background:var(--card);border-radius:18px;padding:18px;max-width:420px;width:100%;max-height:88vh;overflow:auto;
  box-shadow:0 12px 40px rgba(0,0,0,.3);}
.modal h2{font-size:1.25rem;text-align:center;margin-bottom:4px;}
.modal .em{font-size:2.6rem;text-align:center;}
.choice{display:flex;flex-direction:column;gap:9px;margin-top:12px;}
.choice button{text-align:left;background:#fff;border:2px solid var(--line);border-radius:13px;padding:12px 14px;
  font-size:.95rem;font-weight:800;font-family:inherit;color:var(--ink);cursor:pointer;display:flex;align-items:center;gap:10px;}
.choice button:active{transform:scale(.98);}
.choice button .ci{font-size:1.5rem;}
.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(20px);opacity:0;
  background:var(--ink);color:#fff;padding:11px 18px;border-radius:24px;font-weight:800;font-size:.9rem;
  z-index:80;transition:.25s;max-width:90vw;text-align:center;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.foodgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:7px;margin-top:10px;}
.fpick{border:2px solid var(--line);border-radius:11px;padding:7px 3px;text-align:center;cursor:pointer;background:#fff;font-size:.68rem;font-weight:700;}
.fpick .fe{font-size:1.4rem;display:block;}
.fpick.dis{opacity:.35;pointer-events:none;}
.temples{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:.7rem;}
.temples .tcol b{display:block;text-align:center;color:var(--red);margin-bottom:3px;}
.temples .tt{padding:2px 3px;border-radius:5px;background:#faf3e2;margin-bottom:2px;text-align:center;}
.temples .tt.done{background:var(--greenl);color:var(--greend);text-decoration:line-through;}
.rules li{margin:6px 0;padding-left:2px;font-size:.86rem;line-height:1.5;list-style:none;}
.rules .k{font-weight:900;color:var(--greend);}
.pill{display:inline-block;background:var(--greenl);color:var(--greend);border-radius:10px;padding:1px 8px;font-size:.72rem;font-weight:800;margin:1px;}
.foot{text-align:center;font-size:.72rem;color:var(--muted);margin-top:8px;line-height:1.5;}
.winrow{display:flex;align-items:center;gap:8px;padding:8px;border-radius:11px;margin-bottom:6px;background:#fff;border:1px solid var(--line);}
.winrow.first{background:linear-gradient(120deg,#fff6d8,#ffe9a8);border-color:var(--gold);}
.rank{font-size:1.3rem;width:30px;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="towns">北港 × 水林 × 口湖</div>
    <div class="title"><span>美</span><span>食</span><span>大</span><span>富翁</span></div>
    <div class="sub">一起吃・一起玩・一起認識家鄉 🐻</div>
  </div>

  <!-- ===== SETUP ===== -->
  <div id="setup">
    <div class="card">
      <label>👥 玩家人數</label>
      <div class="seg" id="pcSeg" style="margin:6px 0 12px;"></div>
      <div id="pnames"></div>
      <label style="display:block;margin-top:12px;">🎯 獲勝目標（先收集到即為美食大富翁）</label>
      <div class="seg" id="goalSeg" style="margin-top:6px;"></div>
      <button class="btn big" style="margin-top:16px;" onclick="startGame()">🚩 北港出發！開始遊戲</button>
      <button class="btn ghost big" style="margin-top:8px;" onclick="showRules()">📖 遊戲說明</button>
      <div id="resumeWrap" class="hidden"><button class="btn o big" style="margin-top:8px;" onclick="resumeGame()">↩️ 繼續上次遊戲</button></div>
    </div>
    <div class="foot">單機遊玩・免網路・可加到主畫面<br>一起打造雲嘉幸福供應鏈 · 平安・幸福・健康・快樂</div>
  </div>

  <!-- ===== GAME ===== -->
  <div id="game" class="hidden">
    <div class="card" style="padding:10px;">
      <div class="turnbar">
        <div class="pchip"><span class="dot" id="turnDot"></span><span id="turnName"></span> 的回合</div>
        <button class="btn ghost" style="padding:6px 10px;font-size:.78rem;" onclick="showRules()">📖 說明</button>
      </div>
      <div class="dice" id="dice"><div class="blk" id="b1">🥮</div><div class="blk" id="b2">🥮</div></div>
      <div class="rollres" id="rollRes">擲筊決定步數</div>
      <button class="btn big o" id="rollBtn" onclick="doRoll()">🙏 擲筊</button>
    </div>

    <div class="card" style="padding:8px;">
      <div id="board"></div>
    </div>

    <div class="plist" id="plist"></div>

    <div class="row" style="margin-top:4px;">
      <button class="btn ghost" style="flex:1;font-size:.82rem;" onclick="showTemples()">🏯 宮廟巡禮</button>
      <button class="btn ghost" style="flex:1;font-size:.82rem;" onclick="if(confirm('結束本局並看結算？'))endGame()">🏁 結束本局</button>
      <button class="btn ghost" style="flex:1;font-size:.82rem;" onclick="if(confirm('回到首頁？進度會保留，可續玩。'))toHome()">🏠 首頁</button>
    </div>
  </div>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
/* ============ 資料 ============ */
// 24 道在地美食（名稱、emoji、分數/價值、所屬鄉鎮）
const FOODS=[
  {n:'蝦仁飯',e:'🍤',v:1,t:'北港'},
  {n:'鴨肉羹',e:'🦆',v:2,t:'北港'},
  {n:'撋仁粿',e:'🍡',v:12,t:'北港'},
  {n:'麻油雞',e:'🍲',v:5,t:'北港'},
  {n:'魚丸湯',e:'🍡',v:8,t:'北港'},
  {n:'四目魷魚羹',e:'🦑',v:9,t:'口湖'},
  {n:'煎盤粿',e:'🥞',v:10,t:'水林'},
  {n:'紅茶／青草茶',e:'🥤',v:11,t:'北港'},
  {n:'蚵仔煎',e:'🦪',v:11,t:'口湖'},
  {n:'魚丸粥',e:'🥣',v:13,t:'北港'},
  {n:'蚵仔飯',e:'🍚',v:13,t:'口湖'},
  {n:'鱸魚湯',e:'🐟',v:13,t:'口湖'},
  {n:'排骨飯',e:'🍖',v:15,t:'水林'},
  {n:'排骨酥飯',e:'🍗',v:17,t:'水林'},
  {n:'圓仔湯',e:'🍧',v:17,t:'北港'},
  {n:'蚵仔湯',e:'🫕',v:18,t:'口湖'},
  {n:'花枝粥',e:'🦐',v:29,t:'口湖'},
  {n:'鵝肉湯',e:'🦢',v:20,t:'水林'},
  {n:'草仔粿',e:'🟢',v:21,t:'水林'},
  {n:'烏魚子炒飯',e:'🍛',v:22,t:'口湖'},
  {n:'四神湯',e:'🥘',v:23,t:'北港'},
  {n:'土豆油飯',e:'🥜',v:6,t:'口湖'},
  {n:'番茄盤',e:'🍅',v:7,t:'水林'},
  {n:'馬蹄蛤湯',e:'🐚',v:24,t:'口湖'},
];
// 宮廟巡禮
const TEMPLES={
  '北港鎮':['朝天宮','武德宮','義民廟','碧水寺','聖安宮','巡安宮'],
  '水林鄉':['通天府','法輪寺','天保宮','順天宮','七星宮','豐德宮'],
  '口湖鄉':['會水宮','太子宮','福安宮','龍台宮','天台宮','調天宮'],
};
const TEMPLE_LIST=Object.values(TEMPLES).flat();
// 棋盤 28 格（環狀，index0 = START 北港出發），food 對應 FOODS 索引
const BOARD=[
  {ty:'start'},
  {ty:'food',f:0},{ty:'food',f:1},{ty:'food',f:2},
  {ty:'temple'},
  {ty:'food',f:3},{ty:'food',f:4},
  {ty:'chance'},
  {ty:'food',f:5},{ty:'food',f:6},{ty:'food',f:7},{ty:'food',f:8},{ty:'food',f:9},
  {ty:'luck'},
  {ty:'food',f:10},{ty:'food',f:11},{ty:'food',f:12},{ty:'food',f:13},{ty:'food',f:14},
  {ty:'temple'},
  {ty:'food',f:15},{ty:'food',f:16},{ty:'food',f:17},{ty:'food',f:18},{ty:'food',f:19},{ty:'food',f:20},{ty:'food',f:21},{ty:'food',f:22},
];
// 9欄×7列外環座標（index0 = 左下 START，順時針：左上→上→右下→下）
function ringCoords(){
  const cols=9,rows=7,out=[];
  for(let r=rows-1;r>=0;r--)out.push([r,0]);              // 左欄 下→上
  for(let c=1;c<cols;c++)out.push([0,c]);                 // 上列 左→右
  for(let r=1;r<rows;r++)out.push([r,cols-1]);            // 右欄 上→下
  for(let c=cols-2;c>=1;c--)out.push([rows-1,c]);         // 下列 右→左
  return out; // 6+8+6+7 = 27... 調整
}
const TOKENS=['🐻','🦸','🐯','🐰','🐨','🦊'];
const GOAL_OPTS=[6,10,16,24];

/* ============ 狀態 ============ */
let G=null; // {players:[{name,tok,color,pos,foods:Set,temples:int,chance:int,luck:int,skip:bool,lap:int}], cur, goal, over}
const COLORS=['#e0533d','#3a86c8','#5aa544','#f0972b','#8b5cf6','#e6b422'];
let setupCfg={n:2,goal:10,names:['玩家1','玩家2','玩家3','玩家4','玩家5','玩家6'],toks:[0,1,2,3,4,5]};

/* ============ 初始畫面 ============ */
function buildSetup(){
  const pc=document.getElementById('pcSeg');pc.innerHTML='';
  [1,2,3,4].forEach(n=>{const d=document.createElement('div');d.className='opt'+(n===setupCfg.n?' on':'');d.textContent=n+'人';
    d.onclick=()=>{setupCfg.n=n;buildSetup();};pc.appendChild(d);});
  const gs=document.getElementById('goalSeg');gs.innerHTML='';
  GOAL_OPTS.forEach(g=>{const d=document.createElement('div');d.className='opt'+(g===setupCfg.goal?' on':'');
    d.textContent=g===24?'全部24道':g+'道';d.onclick=()=>{setupCfg.goal=g;buildSetup();};gs.appendChild(d);});
  const pn=document.getElementById('pnames');pn.innerHTML='';
  for(let i=0;i<setupCfg.n;i++){
    const box=document.createElement('div');box.style.marginTop='10px';
    box.innerHTML=`<label>玩家 ${i+1}</label>
      <input type="text" value="${setupCfg.names[i]}" maxlength="6" oninput="setupCfg.names[${i}]=this.value" style="margin:4px 0;">
      <div class="tokpick" id="tok${i}"></div>`;
    pn.appendChild(box);
    const tp=box.querySelector('#tok'+i);
    TOKENS.forEach((t,ti)=>{const el=document.createElement('div');el.className='t'+(setupCfg.toks[i]===ti?' on':'');el.textContent=t;
      el.onclick=()=>{setupCfg.toks[i]=ti;buildSetup();};tp.appendChild(el);});
  }
  document.getElementById('resumeWrap').classList.toggle('hidden',!localStorage.getItem('foodopoly_save'));
}

/* ============ 遊戲開始 ============ */
function startGame(){
  // 確保代表符號不重複
  const used=new Set();
  const players=[];
  for(let i=0;i<setupCfg.n;i++){
    let ti=setupCfg.toks[i]; while(used.has(ti))ti=(ti+1)%TOKENS.length; used.add(ti);
    players.push({name:(setupCfg.names[i]||('玩家'+(i+1))).slice(0,6),tok:TOKENS[ti],color:COLORS[ti%COLORS.length],
      pos:0,foods:[],temples:0,chance:0,luck:0,skip:false,lap:0});
  }
  G={players,cur:0,goal:setupCfg.goal,over:false};
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  buildBoard();renderAll();save();
  toast('🚩 '+G.players[0].name+' 先擲筊！');
}
function resumeGame(){
  try{G=JSON.parse(localStorage.getItem('foodopoly_save'));}catch(e){G=null;}
  if(!G){toast('找不到存檔');return;}
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  buildBoard();renderAll();
}
function toHome(){save();document.getElementById('game').classList.add('hidden');document.getElementById('setup').classList.remove('hidden');buildSetup();}
function save(){try{if(G)localStorage.setItem('foodopoly_save',JSON.stringify(G));}catch(e){}}

/* ============ 棋盤渲染 ============ */
let coords=[];
function buildBoard(){
  const bd=document.getElementById('board');bd.innerHTML='';
  bd.style.gridTemplateColumns='repeat(9,1fr)';bd.style.gridTemplateRows='repeat(7,1fr)';
  coords=ringCoords();
  BOARD.forEach((sq,i)=>{
    const c=coords[i]; if(!c)return;
    const el=document.createElement('div');el.className='sq '+sq.ty;el.id='sq'+i;
    el.style.gridRow=(c[0]+1)+'';el.style.gridColumn=(c[1]+1)+'';
    if(sq.ty==='start')el.innerHTML='<div class="emo">🚩</div><div class="nm">START<br>北港出發</div>';
    else if(sq.ty==='temple')el.innerHTML='<div class="emo">🏯</div><div class="nm">宮廟</div>';
    else if(sq.ty==='chance')el.innerHTML='<div class="emo">❓</div><div class="nm">機會</div>';
    else if(sq.ty==='luck')el.innerHTML='<div class="emo">🍀</div><div class="nm">好運</div>';
    else{const f=FOODS[sq.f];el.innerHTML=`<div class="val">${f.v}</div><div class="emo">${f.e}</div><div class="nm">${f.n}</div><div class="toks"></div>`;}
    if(sq.ty==='food'||sq.ty==='start'){const tk=document.createElement('div');tk.className='toks';el.appendChild(tk);}
    bd.appendChild(el);
  });
  // 中央資訊
  const center=document.createElement('div');center.className='center-cell';center.id='centerCell';
  bd.appendChild(center);
  renderCenter();
}
function renderCenter(){
  const c=document.getElementById('centerCell');if(!c)return;
  const p=G.players[G.cur];
  c.innerHTML=`<div style="font-size:.7rem;font-weight:800;color:var(--greend);">求平安・吃美食・收穫滿滿</div>
    <div style="font-size:1.3rem;font-weight:900;color:var(--red);">美食大富翁</div>
    <div style="font-size:.72rem;color:var(--muted);">目標：先收集 <b>${G.goal}</b> 道美食</div>
    <div style="margin-top:4px;font-size:.8rem;">現在：<b style="color:${p.color}">${p.tok} ${p.name}</b></div>
    <div style="font-size:.72rem;color:var(--muted);">已收集 ${p.foods.length}／${G.goal}　宮廟 ${p.temples}／18</div>`;
}
function renderTokensOnBoard(){
  document.querySelectorAll('.sq .toks').forEach(t=>t.innerHTML='');
  document.querySelectorAll('.sq').forEach(s=>s.classList.remove('mine'));
  G.players.forEach((p,i)=>{
    const sq=document.getElementById('sq'+p.pos);if(!sq)return;
    let t=sq.querySelector('.toks');
    if(!t){t=document.createElement('div');t.className='toks';sq.appendChild(t);}
    const sp=document.createElement('span');sp.textContent=p.tok;sp.title=p.name;t.appendChild(sp);
  });
  // 標記目前玩家所在格
  const cp=G.players[G.cur];const cs=document.getElementById('sq'+cp.pos);if(cs)cs.classList.add('mine');
  // 已收集的食物打勾（以目前玩家視角）
  BOARD.forEach((sq,i)=>{if(sq.ty!=='food')return;const el=document.getElementById('sq'+i);
    el.classList.toggle('got',cp.foods.includes(sq.f));});
}
function renderPlayers(){
  const pl=document.getElementById('plist');pl.innerHTML='';
  G.players.forEach((p,i)=>{
    const score=p.foods.reduce((s,fi)=>s+FOODS[fi].v,0)+p.temples*2;
    const card=document.createElement('div');card.className='pcard'+(i===G.cur?' active':'');
    const foodEmos=p.foods.slice(-14).map(fi=>FOODS[fi].e).join('');
    card.innerHTML=`<div class="ph"><span>${p.tok}</span><span style="color:${p.color}">${p.name}</span></div>
      <div class="stat"><span>🍽️ ${p.foods.length}/${G.goal} 道</span><span>⭐ ${score}</span></div>
      <div class="bar"><i style="width:${Math.min(100,p.foods.length/G.goal*100)}%;background:${p.color}"></i></div>
      <div class="foods">${foodEmos||'　'}</div>
      <div class="cards">${p.chance?'❓×'+p.chance+' ':''}${p.luck?'🍀×'+p.luck+' ':''}🏯${p.temples}</div>`;
    pl.appendChild(card);
  });
}
function renderTurn(){
  const p=G.players[G.cur];
  document.getElementById('turnName').textContent=p.tok+' '+p.name;
  document.getElementById('turnDot').style.background=p.color;
}
function renderAll(){renderTokensOnBoard();renderPlayers();renderTurn();renderCenter();}

/* ============ 擲筊 & 移動 ============ */
let busy=false;
function doRoll(){
  if(busy||G.over)return; busy=true;
  const btn=document.getElementById('rollBtn');btn.disabled=true;
  const b1=document.getElementById('b1'),b2=document.getElementById('b2');
  b1.classList.add('rolling');b2.classList.add('rolling');
  document.getElementById('rollRes').textContent='擲筊中…';
  const a=Math.random()<.5?1:0, b=Math.random()<.5?1:0; // 1=正(平/陽向上) 0=反(圓/陰)
  setTimeout(()=>{
    b1.classList.remove('rolling');b2.classList.remove('rolling');
    b1.classList.toggle('up',a===1);b2.classList.toggle('up',b===1);
    b1.textContent=a===1?'🌓':'🌑';b2.textContent=b===1?'🌓':'🌑';
    let steps=0,label='',cls='';
    if(a!==b){steps=2;label='聖筊！前進 2 格';cls='sheng';}
    else if(a===1&&b===1){steps=1;label='笑筊！前進 1 格';cls='xiao';}
    else{steps=0;label='陰筊…停留 1 回合';cls='yin';}
    document.getElementById('rollRes').innerHTML='<span class="'+cls+'">'+label+'</span>';
    if(steps===0){ setTimeout(()=>{toast('😅 '+G.players[G.cur].name+' 停留一回合');nextTurn();busy=false;},900); }
    else{ setTimeout(()=>movePlayer(G.cur,steps,()=>{busy=false;}),700); }
  },700);
}
function movePlayer(pi,steps,done){
  const p=G.players[pi];let left=steps;
  const hop=()=>{
    if(left<=0){ landOn(pi,done); return; }
    p.pos=(p.pos+1)%BOARD.length;
    if(p.pos===0){p.lap++;toast('🔄 '+p.name+' 完成一圈！');}
    left--; renderTokensOnBoard();renderCenter();
    beep(660,40);
    setTimeout(hop,230);
  };
  hop();
}
function landOn(pi,done){
  const p=G.players[pi];const sq=BOARD[p.pos];
  renderAll();save();
  if(sq.ty==='food'){
    const fi=sq.f,f=FOODS[fi];
    if(!p.foods.includes(fi)){p.foods.push(fi);beep(880,80);toast('🍽️ '+p.name+' 收集到「'+f.n+'」+'+f.v+'分');renderAll();save();
      if(checkWin(pi)){done&&done();return;}
    }else{ toast('😋 '+f.n+'（已收集過）'); }
    setTimeout(()=>{nextTurn();done&&done();},700);
  }else if(sq.ty==='temple'){
    visitTemple(pi,()=>{ setTimeout(()=>{nextTurn();done&&done();},400); });
  }else if(sq.ty==='chance'){
    drawCard(pi,'chance',()=>{ if(!G.over){nextTurn();} done&&done(); });
  }else if(sq.ty==='luck'){
    drawCard(pi,'luck',()=>{ if(!G.over){nextTurn();} done&&done(); });
  }else{ // start
    toast('🚩 回到 START，領取平安！');
    setTimeout(()=>{nextTurn();done&&done();},600);
  }
}
function visitTemple(pi,cb){
  const p=G.players[pi];
  if(p.temples>=TEMPLE_LIST.length){toast('🏯 已完成全部宮廟巡禮！');cb&&cb();return;}
  const name=TEMPLE_LIST[p.temples];p.temples++;beep(560,90);
  let extra='';
  if(p.temples%3===0){p.chance++;extra=' 🎁 獲得一次「機會」！';}
  if(p.temples%8===0){p.luck++;extra+=' 🍀 獲得一次「好運」！';}
  renderAll();save();
  toast('🏯 參拜「'+name+'」（'+p.temples+'/18）'+extra);
  cb&&cb();
}

/* ============ 機會 / 好運 卡 ============ */
function drawCard(pi,kind,cb){
  const p=G.players[pi];
  const isLuck=kind==='luck';
  const title=isLuck?'🍀 好運':'❓ 機會';
  const emo=isLuck?'🍀':'❓';
  const opts=isLuck
    ? [{ci:'⏩',t:'前進 3 格',fn:()=>afterExtraMove(pi,3,cb)},
       {ci:'🎲',t:'再擲一次筊',fn:()=>{closeModal();rerollFor(pi,cb);}},
       {ci:'🍽️',t:'任選兩道美食',fn:()=>pickFoods(pi,2,cb)}]
    : [{ci:'⏩',t:'前進 2 格',fn:()=>afterExtraMove(pi,2,cb)},
       {ci:'🎲',t:'再擲一次筊',fn:()=>{closeModal();rerollFor(pi,cb);}},
       {ci:'🍽️',t:'任選一道美食',fn:()=>pickFoods(pi,1,cb)}];
  openModal(`<div class="em">${emo}</div><h2>${title}（三選一）</h2>
    <div class="hint" style="text-align:center;">${p.tok} ${p.name}，請選擇：</div>
    <div class="choice" id="cardChoice"></div>`);
  const box=document.getElementById('cardChoice');
  opts.forEach(o=>{const b=document.createElement('button');b.innerHTML=`<span class="ci">${o.ci}</span>${o.t}`;
    b.onclick=o.fn;box.appendChild(b);});
}
function afterExtraMove(pi,steps,cb){ closeModal(); movePlayer(pi,steps,cb); }
function rerollFor(pi,cb){
  // 額外擲一次：只計步數前進（不觸發停留跳過）
  const a=Math.random()<.5?1:0,b=Math.random()<.5?1:0;
  let steps= a!==b?2:(a===1?1:0);
  const lbl= a!==b?'聖筊 前進2':(a===1?'笑筊 前進1':'陰筊 這次不動');
  toast('🎲 '+lbl);
  if(steps===0){ setTimeout(()=>{if(!G.over)nextTurn();cb&&cb();},700); }
  else setTimeout(()=>movePlayer(pi,steps,cb),500);
}
function pickFoods(pi,count,cb){
  const p=G.players[pi];
  openModal(`<div class="em">🍽️</div><h2>任選 ${count} 道美食</h2>
    <div class="hint" style="text-align:center;">點選要收集的美食（尚未收集才可選）</div>
    <div class="foodgrid" id="fpickGrid"></div>`);
  let picked=0;
  const grid=document.getElementById('fpickGrid');
  FOODS.forEach((f,fi)=>{
    const has=p.foods.includes(fi);
    const el=document.createElement('div');el.className='fpick'+(has?' dis':'');
    el.innerHTML=`<span class="fe">${f.e}</span>${f.n}<br><b style="color:var(--orange)">${f.v}</b>`;
    if(!has)el.onclick=()=>{
      if(picked>=count)return;
      p.foods.push(fi);picked++;el.classList.add('dis');beep(880,70);
      renderAll();save();
      if(checkWin(pi)){closeModal();cb&&cb();return;}
      if(picked>=count){ setTimeout(()=>{closeModal();cb&&cb();},350); }
    };
    grid.appendChild(el);
  });
  // 若已無可選
  if(p.foods.length>=FOODS.length){ setTimeout(()=>{closeModal();cb&&cb();},300); }
}

/* ============ 回合 / 勝負 ============ */
function nextTurn(){
  if(G.over)return;
  let n=G.cur;
  for(let k=0;k<G.players.length;k++){
    n=(n+1)%G.players.length;
    if(G.players[n].skip){G.players[n].skip=false;toast('⏭️ '+G.players[n].name+' 這回合停留');continue;}
    break;
  }
  G.cur=n;renderAll();save();
  document.getElementById('rollBtn').disabled=false;
  document.getElementById('rollRes').textContent=G.players[G.cur].name+'，請擲筊';
}
function checkWin(pi){
  const p=G.players[pi];
  if(p.foods.length>=G.goal){ G.over=true;save();showWin(pi); return true; }
  return false;
}
function endGame(){ G.over=true;save();showWin(-1); }
function showWin(winnerIdx){
  document.getElementById('rollBtn').disabled=true;
  const ranked=G.players.map((p,i)=>({p,i,score:p.foods.reduce((s,fi)=>s+FOODS[fi].v,0)+p.temples*2}))
    .sort((a,b)=> b.p.foods.length-a.p.foods.length || b.score-a.score);
  const champ = winnerIdx>=0 ? G.players[winnerIdx] : ranked[0].p;
  let rows=ranked.map((r,idx)=>{
    const medal=['🥇','🥈','🥉','🏅','🏅','🏅'][idx];
    return `<div class="winrow ${idx===0?'first':''}"><div class="rank">${medal}</div>
      <div style="flex:1;"><b style="color:${r.p.color}">${r.p.tok} ${r.p.name}</b>
      <div class="hint">🍽️ ${r.p.foods.length} 道・⭐ ${r.score} 分・🏯 ${r.p.temples}</div></div></div>`;
  }).join('');
  openModal(`<div class="em">🏆</div><h2>${champ.tok} ${champ.name} 是美食大富翁！</h2>
    <div class="hint" style="text-align:center;">宮廟巡禮 ＋ 美食收集 ＋ 機會好運 = 幸福滿滿</div>
    <div style="margin-top:12px;">${rows}</div>
    <button class="btn big" style="margin-top:14px;" onclick="closeModal();newRound()">🔁 再玩一局</button>
    <button class="btn ghost big" style="margin-top:8px;" onclick="closeModal();localStorage.removeItem('foodopoly_save');toHome()">🏠 回首頁</button>`,true);
  try{localStorage.removeItem('foodopoly_save');}catch(e){}
}
function newRound(){
  G.players.forEach(p=>{p.pos=0;p.foods=[];p.temples=0;p.chance=0;p.luck=0;p.skip=false;p.lap=0;});
  G.cur=0;G.over=false;renderAll();save();
  document.getElementById('rollBtn').disabled=false;
  document.getElementById('rollRes').textContent=G.players[0].name+'，請擲筊';
  toast('🚩 新的一局開始！');
}

/* ============ 說明 / 宮廟 / Modal ============ */
function showRules(){
  openModal(`<div class="em">📖</div><h2>遊戲說明</h2>
  <ul class="rules">
    <li><span class="k">1. 擲筊決定步數</span>（每回合一次）：<br>
      🌓🌑 <b class="pill">聖筊</b> 一正一反 → 前進 2 格<br>
      🌓🌓 <b class="pill">笑筊</b> 兩正 → 前進 1 格<br>
      🌑🌑 <b class="pill">陰筊</b> 兩反 → 停留 1 回合</li>
    <li><span class="k">2. 收集美食</span>：走到哪一格就收集那道美食，集滿目標道數就是<b>美食大富翁</b>！</li>
    <li><span class="k">3. 拜訪宮廟 🏯</span>：走到宮廟格參拜一間；每參拜 <b>3 間</b>得一次「機會」，每 <b>8 間</b>得一次「好運」。</li>
    <li><span class="k">4. 機會 ❓（三選一）</span>：前進 2 格／再擲一次筊／任選一道美食。</li>
    <li><span class="k">5. 好運 🍀（三選一）</span>：前進 3 格／再擲一次筊／任選兩道美食。</li>
    <li><span class="k">6. 勝利方程式</span>：宮廟巡禮 ＋ 美食收集 ＋ 機會好運 ＝ 🏆 最快集滿目標美食者獲勝。</li>
  </ul>
  <div class="hint" style="text-align:center;">一起吃・一起玩・一起認識家鄉 🐻<br>北港 × 水林 × 口湖</div>
  <button class="btn big" style="margin-top:12px;" onclick="closeModal()">知道了</button>`);
}
function showTemples(){
  const p=G?G.players[G.cur]:null;
  let cols=Object.keys(TEMPLES).map(town=>{
    const arr=TEMPLES[town];
    const items=arr.map((t)=>{const idx=TEMPLE_LIST.indexOf(t);const done=p&&p.temples>idx;
      return `<div class="tt ${done?'done':''}">${t}</div>`;}).join('');
    return `<div class="tcol"><b>${town}</b>${items}</div>`;
  }).join('');
  openModal(`<div class="em">🏯</div><h2>宮廟巡禮</h2>
    ${p?`<div class="hint" style="text-align:center;">${p.tok} ${p.name} 已參拜 <b>${p.temples}</b>／18 間（每3間得機會、每8間得好運）</div>`:''}
    <div class="temples" style="margin-top:10px;">${cols}</div>
    <button class="btn big" style="margin-top:12px;" onclick="closeModal()">關閉</button>`);
}
function openModal(html,noClose){
  const root=document.getElementById('modalRoot');
  root.innerHTML=`<div class="overlay" ${noClose?'':'onclick="if(event.target===this)closeModal()"'}><div class="modal">${html}</div></div>`;
}
function closeModal(){document.getElementById('modalRoot').innerHTML='';}

/* ============ 小工具 ============ */
let toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1900);}
let actx;
function beep(freq,ms){try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();
  const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=freq;
  o.connect(g);g.connect(actx.destination);g.gain.setValueAtTime(.06,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+ms/1000);
  o.start();o.stop(actx.currentTime+ms/1000);}catch(e){}}

buildSetup();
</script>
