<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1D9E75">
<title>足部訓練 · 暖身與垂足復健</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#1D9E75;--tl:#E1F5EE;--tm:#5DCAA5;--td:#0F6E56;
  --amb:#EF9F27;--al:#FAEEDA;--amd:#854F0B;
  --red:#E24B4A;
  --warm1:#5B9BD5;--warm1l:#EBF3FB;--warm1d:#2E6DA4;
  --bg:#fff;--bg2:#f7f6f2;--bg3:#f0ede8;
  --tx:#1a1a1a;--tx2:#6b6b6b;
  --br:#e0ddd8;--br2:#ccc;
  --ra:14px;--ra2:10px;
  --shadow:0 2px 8px rgba(0,0,0,.07);
  --max:480px;
}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--bg3);
  min-height:100vh;
  min-height:-webkit-fill-available;
  padding:max(env(safe-area-inset-top),12px)
          env(safe-area-inset-right,12px)
          calc(env(safe-area-inset-bottom,0px)+20px)
          env(safe-area-inset-left,12px);
  -webkit-tap-highlight-color:transparent;
}
.app{max-width:var(--max);margin:0 auto;display:flex;flex-direction:column;gap:.65rem}

/* Home */
.home{display:flex;flex-direction:column;gap:.65rem}
.home-hdr{background:var(--bg);border-radius:var(--ra);border:1px solid var(--br);
  padding:20px 16px 16px;text-align:center}
.home-hdr h1{font-size:20px;font-weight:700;color:var(--tx);letter-spacing:-.3px}
.home-hdr p{font-size:13px;color:var(--tx2);margin-top:5px;line-height:1.6}
.mode-cards{display:flex;flex-direction:column;gap:.65rem}
@media(min-width:420px){.mode-cards{flex-direction:row}.mode-card{flex:1}}
.mode-card{background:var(--bg);border-radius:var(--ra);border:2px solid var(--br);
  padding:20px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;
  transition:border-color .2s,transform .1s,box-shadow .2s;
  -webkit-tap-highlight-color:transparent;user-select:none}
.mode-card:active{transform:scale(.98)}
.mode-card:hover{border-color:var(--tm);box-shadow:var(--shadow)}
.mode-card.warm:hover{border-color:var(--warm1)}
@media(min-width:420px){
  .mode-card{flex-direction:column;align-items:center;text-align:center;padding:22px 14px}}
.mode-icon{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:26px;flex-shrink:0}
.mode-icon.green{background:var(--tl);color:var(--td)}
.mode-icon.blue{background:var(--warm1l);color:var(--warm1d)}
.mode-text{flex:1}
@media(min-width:420px){.mode-text{flex:unset;width:100%}}
.mode-title{font-size:17px;font-weight:700;color:var(--tx);letter-spacing:-.2px}
.mode-sub{font-size:12.5px;color:var(--tx2);line-height:1.6;margin-top:4px}
.mode-badge{display:inline-block;font-size:11px;padding:3px 9px;
  border-radius:20px;font-weight:600;margin-bottom:5px}
.mode-badge.g{background:var(--tl);color:var(--td)}
.mode-badge.b{background:var(--warm1l);color:var(--warm1d)}
.home-foot{font-size:11px;color:var(--tx2);text-align:center;line-height:1.7;
  padding:2px 8px}

/* Header */
.hdr{background:var(--bg);border-radius:var(--ra);border:1px solid var(--br);
  padding:12px 14px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:10}
.hdr-back{width:34px;height:34px;border-radius:50%;border:1px solid var(--br);
  background:transparent;cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;color:var(--tx2);
  -webkit-tap-highlight-color:transparent}
.hdr-back:active{background:var(--bg2)}
.hic{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;flex-shrink:0}
.hic.green{background:var(--tl)} .hic.green i{font-size:18px;color:var(--td)}
.hic.blue{background:var(--warm1l)} .hic.blue i{font-size:18px;color:var(--warm1d)}
.htx{flex:1;min-width:0}
.htx h1{font-size:15px;font-weight:700;color:var(--tx);letter-spacing:-.2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.htx p{font-size:11px;color:var(--tx2);margin-top:1px}

/* Step nav */
.steprow{background:var(--bg);border-radius:var(--ra);border:1px solid var(--br);
  padding:11px 12px;display:flex;align-items:flex-start;overflow-x:auto;
  scrollbar-width:none;gap:0;-webkit-overflow-scrolling:touch}
.steprow::-webkit-scrollbar{display:none}
.sdot{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
  flex-shrink:0;min-width:54px;-webkit-tap-highlight-color:transparent}
.sn{width:27px;height:27px;border-radius:50%;border:1.5px solid var(--br2);
  display:flex;align-items:center;justify-content:center;font-size:12px;
  font-weight:700;color:var(--tx2);background:var(--bg);transition:all .2s}
.sdot.done .sn{background:var(--teal);border-color:var(--teal);color:#fff}
.sdot.cur .sn{background:var(--tl);border-color:var(--teal);color:var(--td)}
.sdot.wdone .sn{background:var(--warm1);border-color:var(--warm1);color:#fff}
.sdot.wcur .sn{background:var(--warm1l);border-color:var(--warm1);color:var(--warm1d)}
.sl{font-size:10.5px;color:var(--tx2);text-align:center;line-height:1.3;white-space:nowrap}
.sdot.cur .sl{color:var(--td);font-weight:600}
.sdot.wcur .sl{color:var(--warm1d);font-weight:600}
.sdot.done .sl{color:var(--teal);font-weight:500}
.sdot.wdone .sl{color:var(--warm1);font-weight:500}
.sbar{flex:1;height:1.5px;background:var(--br);min-width:4px;max-width:16px;
  flex-shrink:1;margin-top:12px;transition:background .3s}
.sbar.done{background:var(--teal)} .sbar.wdone{background:var(--warm1)}

/* Voice row */
.vrow{background:var(--bg);border-radius:var(--ra2);border:1px solid var(--br);
  padding:9px 14px;display:flex;align-items:center;gap:10px}
.vlbl{font-size:13px;color:var(--tx2);flex:1;display:flex;align-items:center;gap:6px}
.vst{font-size:12px;color:var(--td);font-weight:600}
.vst.blue{color:var(--warm1d)}
.tgl{width:38px;height:22px;background:var(--teal);border-radius:11px;border:none;
  cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.tgl.blue{background:var(--warm1)}
.tgl.off{background:#ccc}
.tgl::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;
  background:#fff;top:3px;left:3px;transition:transform .2s;
  box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tgl:not(.off)::after{transform:translateX(16px)}

/* Card */
.card{background:var(--bg);border-radius:var(--ra);border:1px solid var(--br);
  overflow:hidden;box-shadow:var(--shadow)}
.ctop{padding:11px 14px;border-bottom:1px solid var(--br);
  display:flex;align-items:center;gap:9px}
.cnum{width:24px;height:24px;border-radius:50%;background:var(--tl);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--td);flex-shrink:0}
.cnum.blue{background:var(--warm1l);color:var(--warm1d)}
.ct{font-size:15px;font-weight:700;color:var(--tx);flex:1;letter-spacing:-.2px}
.cbdg{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--tl);
  color:var(--td);font-weight:600;border:1px solid rgba(29,158,117,.2);white-space:nowrap}
.cbdg.blue{background:var(--warm1l);color:var(--warm1d);border-color:rgba(91,155,213,.25)}
.cbody{padding:12px;display:flex;flex-direction:column;gap:10px}

/* Image */
.illus-wrap{background:var(--bg2);border-radius:var(--ra2);border:1px solid var(--br);overflow:hidden}
.illus-wrap svg{width:100%;height:auto;display:block}

/* Instruction text */
.inst{font-size:13px;color:var(--tx2);line-height:1.75}
.inst strong{color:var(--tx);font-weight:700}

/* Warm-up info blocks */
.warm-block{background:var(--bg2);border-radius:var(--ra2);border:1px solid var(--br);padding:10px 12px}
.warm-block-title{font-size:13px;font-weight:700;color:var(--warm1d);margin-bottom:5px;
  display:flex;align-items:center;gap:6px}
.warm-block-title i{font-size:14px}
.warm-steps{display:flex;flex-direction:column;gap:4px}
.warm-step{font-size:13px;color:var(--tx2);line-height:1.7;padding-left:13px;position:relative}
.warm-step::before{content:'•';position:absolute;left:0;color:var(--warm1);font-weight:700}
.warm-step strong{color:var(--tx);font-weight:600}
.warm-tip{font-size:12px;color:var(--amd);background:var(--al);border-radius:8px;
  padding:8px 11px;display:flex;align-items:flex-start;gap:7px}
.warm-tip i{flex-shrink:0;margin-top:1px;font-size:14px}

/* Chips / Steppers */
.chips{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.chip{background:var(--bg2);border:1px solid var(--br);border-radius:var(--ra2);
  padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:4px}
.chip.mod{border-color:var(--amb)}
.chip-label{font-size:11px;color:var(--tx2);text-align:center}
.chip.mod .chip-label{color:var(--amd)}
.chip-val{font-size:19px;font-weight:700;color:var(--td);line-height:1}
.stepper{display:flex;align-items:center;gap:4px}
.stp-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--teal);
  background:transparent;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:16px;font-weight:700;color:var(--teal);
  -webkit-tap-highlight-color:transparent}
.stp-btn:active{background:var(--tl)}
.stp-val{font-size:20px;font-weight:700;color:var(--td);min-width:26px;text-align:center}

/* Phase indicator */
.phi{display:none;align-items:center;gap:8px;font-size:13px;color:var(--tx);
  padding:8px 12px;border-radius:var(--ra2);border:1px solid var(--tm);background:var(--tl)}
.phd{width:8px;height:8px;border-radius:50%;background:var(--teal);flex-shrink:0}
.phd.rest{background:var(--amb)}
.phi.wphi{border-color:var(--warm1);background:var(--warm1l)}
.phi.wphi .phd{background:var(--warm1)}

/* Timer ring */
.twrap{display:flex;justify-content:center;padding:2px 0}
.rw{position:relative;width:90px;height:90px}
.rw svg{transform:rotate(-90deg)}
.trk{fill:none;stroke:var(--br);stroke-width:6}
.fil{fill:none;stroke:var(--teal);stroke-width:6;stroke-linecap:round;
  transition:stroke-dashoffset 1s linear}
.fil.blue{stroke:var(--warm1)}
.fil.rest{stroke:var(--amb)}
.rlb{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center}
.rn{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;
  color:var(--tx);line-height:1}
.ru{font-size:11px;color:var(--tx2);margin-top:2px}

/* Done banner */
.dban{display:none;border-radius:var(--ra2);padding:10px 13px;
  text-align:center;font-size:13px;font-weight:600}
.dban.green{background:var(--tl);border:1px solid var(--tm);color:var(--td)}
.dban.blue{background:var(--warm1l);border:1px solid var(--warm1);color:var(--warm1d)}

/* Buttons */
.btns{display:flex;gap:8px}
.bgo{flex:2;color:#fff;border:none;border-radius:var(--ra2);padding:14px;
  font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:6px;
  min-height:48px;-webkit-tap-highlight-color:transparent}
.bgo.green{background:var(--teal)} .bgo.blue{background:var(--warm1)}
.bgo:active{opacity:.82} .bgo:disabled{opacity:.5;cursor:default}
.brst{flex:1;background:transparent;border:1px solid var(--br);border-radius:var(--ra2);
  padding:14px;font-size:13px;color:var(--tx2);cursor:pointer;font-family:inherit;
  min-height:48px;-webkit-tap-highlight-color:transparent}
.brst:active{background:var(--bg2)}
.nav{display:flex;gap:8px}
.npv{flex:1;background:transparent;border:1px solid var(--br);border-radius:var(--ra2);
  padding:13px;font-size:13px;color:var(--tx2);cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:4px;min-height:48px;
  -webkit-tap-highlight-color:transparent}
.npv:active:not(:disabled){background:var(--bg2)}
.npv:disabled{opacity:.3;cursor:default}
.nnx{flex:2;color:#fff;border:none;border-radius:var(--ra2);padding:13px;
  font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:5px;min-height:48px;
  -webkit-tap-highlight-color:transparent}
.nnx.green{background:var(--td)} .nnx.blue{background:var(--warm1d)}
.nnx:active{opacity:.85}

/* Done screen */
.done-scr{text-align:center;padding:24px 14px 28px}
.done-ic{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;margin:0 auto .9rem;font-size:30px}
.done-ic.green{background:var(--tl);color:var(--td)} .done-ic.blue{background:var(--warm1l);color:var(--warm1d)}
.done-scr h2{font-size:20px;font-weight:700;color:var(--tx);margin-bottom:.4rem}
.done-scr p{font-size:14px;color:var(--tx2);line-height:1.9}
.bres{margin-top:1.2rem;color:#fff;border:none;border-radius:var(--ra2);
  padding:12px 22px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;
  display:inline-flex;align-items:center;gap:6px;min-height:46px;
  -webkit-tap-highlight-color:transparent}
.bres.green{background:var(--teal)} .bres.blue{background:var(--warm1)}

/* Misc */
.tip{display:flex;align-items:flex-start;gap:7px;font-size:12px;color:var(--tx2);
  background:var(--bg2);border-radius:var(--ra2);padding:9px 11px;border:1px solid var(--br)}
.tip i{flex-shrink:0;margin-top:1px;font-size:14px}
.leg{display:flex;gap:6px;flex-wrap:wrap;padding:2px 2px 0}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx2)}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
/* ===================== STATE ===================== */
let mode = 'home';          // 'home' | 'warm' | 'rehab'
let voiceOn = true;

// Warm-up
let wcur = 0, wStep = 0, wtmr = null, wSS = null;
let wS = {};                // completion flags
let wFired = {};            // triggers already fired this exercise

// Rehab
let rcur = 0, tmr = null, ss = null, totS = 0;
let cS = {};                // completed sets per exercise
let custom = {};            // user overrides

/* ===================== DATA ===================== */
const WARM = [
  {id:'warm1', title:'足底放鬆', badge:'1分10秒', dur:69,
   spk:{s:'開始足底放鬆，將腳踩在按摩球上，準備慢慢滾動',m:'繼續滾動，感覺微酸即可',e:'足底放鬆完成'},
   steps:[
     {title:'目的與工具', icon:'ti-info-circle',
      lines:['放鬆足底筋膜，喚醒足底感覺','工具：按摩球 / 網球 / 寶特瓶','泡溫水 5 分鐘後效果更好'],
      img:'w1_forefoot', spk:null},
     {title:'前足', icon:'ti-arrow-right',
      lines:['腳踩按摩球放在前足位置','來回滾動 20 秒','力道適中，感覺微酸即可'],
      img:'w1_forefoot', spk:'前足，往前慢慢滾動二十秒'},
     {title:'足弓', icon:'ti-arrow-right',
      lines:['移動到足弓位置','來回滾動 20 秒','這裡最常緊繃，稍微多停'],
      img:'w1_arch', spk:'移到足弓，繼續滾動'},
     {title:'腳跟', icon:'ti-arrow-right',
      lines:['移動到腳跟位置','來回滾動 20 秒','感受整個足底的放鬆'],
      img:'w1_heel', spk:'移到腳跟，慢慢滾動'},
   ],
   tip:'力道適中，目的是喚醒感覺，不是破壞筋膜。'},

  {id:'warm2', title:'小腿後側伸展', badge:'1分10秒', dur:69,
   spk:{s:'面對牆壁，後腳腳跟踩穩地板，膝蓋打直，準備伸展',m:'感受小腿後側拉緊，保持腳跟貼地',e:'小腿伸展完成'},
   steps:[
     {title:'目的', icon:'ti-info-circle',
      lines:['放鬆小腿後側肌群','降低阿基里斯腱張力，減少前足拉扯','前足容易痛常代表小腿太緊'],
      img:'w2_straight', spk:null},
     {title:'動作 A：膝蓋打直', icon:'ti-arrow-right',
      lines:['後腳腳跟踩地，膝蓋打直','身體微向前壓，維持 15 秒','換腳再做一次，共 2 次','伸展：腓腸肌'],
      img:'w2_straight', spk:'膝蓋打直，腳跟踩穩，感受小腿後側拉緊，維持十五秒'},
     {title:'動作 B：膝蓋微彎', icon:'ti-arrow-right',
      lines:['相同姿勢但膝蓋微彎','維持 15 秒，換腳 2 次','伸展：比目魚肌（更深層）'],
      img:'w2_bent', spk:'膝蓋微彎，再次伸展更深層的比目魚肌，維持十五秒'},
   ],
   tip:'腳跟一定要踩地，身體微向前壓，才會感受到小腿後側拉伸。'},

  {id:'warm3', title:'腳踝喚醒', badge:'50秒', dur:51,
   spk:{s:'開始腳踝喚醒，坐著或站著，準備腳尖往上抬',m:'動作放慢，感受腳掌的滾動感',e:'腳踝喚醒完成'},
   steps:[
     {title:'目的', icon:'ti-info-circle',
      lines:['喚醒脛前肌與腳踝控制','提升腳踝活動度與穩定度','有垂足的人腳踝控制需要先開機'],
      img:'w3_A', spk:null},
     {title:'動作 A：腳尖上抬', icon:'ti-arrow-right',
      lines:['坐著或站著','腳尖往上抬，停 1 秒後放下','做 15～20 次，動作要慢'],
      img:'w3_A', spk:'腳尖往上抬，停一秒，慢慢放下，重複十五到二十次'},
     {title:'動作 B：腳跟—腳尖轉移', icon:'ti-arrow-right',
      lines:['慢慢將重心從腳跟移到前腳掌','再回到腳跟，重複 10～15 次','感受腳掌的滾動感'],
      img:'w3_B', spk:'重心從腳跟慢慢移到前腳掌，再回來，讓腳重新找回滾動感'},
   ],
   tip:'動作慢，不要快。讓腳重新找回滾動感，這對改善步態很重要。'},

  {id:'warm4', title:'臀部啟動', badge:'1分10秒', dur:69,
   spk:{s:'開始臀部啟動，膝蓋微彎，準備站姿側移怪獸走',m:'感受臀部外側出力，保持核心穩定，骨盆不要搖晃',e:'臀部啟動完成，所有暖身動作結束'},
   steps:[
     {title:'目的', icon:'ti-info-circle',
      lines:['啟動臀中肌，減少代償','穩定骨盆與步態','左大腿外側酸常代表左側在代償右腳'],
      img:'w4_B', spk:null},
     {title:'動作：站姿側移', icon:'ti-arrow-right',
      lines:['膝蓋微彎，彈力帶套在膝上（可選）','小步往側邊移動再回來','來回 10～15 步 × 2 組'],
      img:'w4_B', spk:'膝蓋微彎，小步往側邊移動，保持核心穩定，感受臀部外側'},
   ],
   tip:'骨盆不要左右搖晃，重點是感受臀部外側出力，而不是大腿用力。'},
];

/* ===================== VOICE ===================== */
function spk(text){
  if(!voiceOn || !text) return;
  try{
    if(!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-TW'; u.rate = 0.9;
    speechSynthesis.speak(u);
  }catch(e){}
}
function stopSpk(){ try{ speechSynthesis.cancel(); }catch(e){} }

/* ===================== NAV ===================== */
function clearTimers(){
  if(wtmr){clearInterval(wtmr);wtmr=null;}
  if(tmr){clearInterval(tmr);tmr=null;}
  stopSpk();
}
function setMode(m){
  clearTimers();
  mode = m;
  if(m==='warm'){wcur=0;wStep=0;wS={};wFired={};wSS=Date.now();}
  if(m==='rehab'){rcur=0;cS={};totS=0;ss=Date.now();}
  render();
}
function backHome(){ clearTimers(); mode='home'; render(); }
function togV(){
  voiceOn = !voiceOn;
  if(!voiceOn) stopSpk();
  const t = document.getElementById('vtgl');
  const s = document.getElementById('vstat');
  if(t){ t.classList.toggle('off', !voiceOn); }
  if(s){ s.textContent = voiceOn ? '語音開' : '語音關'; }
}
const C42 = 2 * Math.PI * 42;

    if(i<wStep) cls=' wdone';
    else if(i===wStep) cls=' wcur';

function wSetStep(i){
  if(wtmr) return; // don't jump while running
  wStep = i;
  updateWarmUI(i);
}
function updateWarmUI(stepIdx){
  const ex = WARM[wcur];
  const st = ex.steps[stepIdx];
  const img = document.getElementById('warmImg');
  if(img) img.innerHTML = WARM_IMGS[st.img];
  const t = document.getElementById('wbTitle');
  if(t) t.innerHTML = `<i class="ti ${st.icon}"></i>${st.title}`;
  const s = document.getElementById('wbSteps');
  if(s) s.innerHTML = st.lines.map(l=>`<div class="warm-step">${l.replace(/(伸展：[^<]+|工具：[^<]+)/,'<strong>$1</strong>')}</div>`).join('');
  // step row highlight
  document.querySelectorAll('.steprow .sdot').forEach((d,i)=>{
    d.classList.remove('wdone','wcur');
    if(i<stepIdx) d.classList.add('wdone');
    else if(i===stepIdx) d.classList.add('wcur');
  });
}
function startWarm(){
  const ex = WARM[wcur];
  const btn = document.getElementById('wgoBtn');
  if(btn) btn.disabled = true;
  document.getElementById('wtwrap').style.display='block';
  const phi = document.getElementById('wphi');
  phi.style.display='flex';
  document.getElementById('wphiTx').textContent='進行中…';
  // action steps only
  const actionSteps = ex.steps.map((s,i)=>({...s, idx:i})).filter(s=>s.spk);
  wFired = {};
  spk(ex.spk.s);
  // go to first action step
  wStep = actionSteps.length ? actionSteps[0].idx : 0;
  updateWarmUI(wStep);
  setTimeout(()=> runWarmTimer(ex, actionSteps), 1500);
}
function runWarmTimer(ex, actionSteps){
  let rem = ex.dur;
  const slotSec = Math.floor(ex.dur / Math.max(actionSteps.length,1));
  const triggers = actionSteps.map((s,n)=>({rem: ex.dur - slotSec*(n+1), step:s, n}));
  const ring = document.getElementById('ring');
  const num = document.getElementById('rnum');
  num.textContent = rem;
  ring.style.strokeDashoffset = 0;
  wtmr = setInterval(()=>{
    rem--;
    if(num) num.textContent = Math.max(rem,0);
    if(ring) ring.style.strokeDashoffset = C42 * (1 - Math.max(rem,0)/ex.dur);
    // fire step switches (start of each slot)
    triggers.forEach(tr=>{
      if(!wFired[tr.n] && rem <= (ex.dur - slotSec*tr.n) && tr.n>0){
        wFired[tr.n]=true;
        updateWarmUI(tr.step.idx);
        spk(tr.step.spk);
      }
    });
    // mid cue
    if(rem === Math.floor(ex.dur/2)) spk(ex.spk.m);
    if(rem<=0){
      clearInterval(wtmr); wtmr=null;
      wFinishEx(ex);
    }
  },1000);
}
function wFinishEx(ex){
  spk(ex.spk.e);
  wS[ex.id]=1;
  const dban = document.getElementById('wdban');
  if(dban){ dban.style.display='block'; dban.textContent='✓ '+ex.title+' 完成'; }
  document.getElementById('wtwrap').style.display='none';
  // mark all steps done
  document.querySelectorAll('.steprow .sdot').forEach(d=>{d.classList.remove('wcur');d.classList.add('wdone');});
  if(wcur < WARM.length-1){
    autoWarmNext();
  }else{
    const phi = document.getElementById('wphi');
    phi.style.display='flex';
    document.getElementById('wphiTx').textContent='全部暖身完成！';
    setTimeout(wFinish, 1600);
  }
}
function autoWarmNext(){
  let c = 10;
  const phi = document.getElementById('wphi');
  const tx = document.getElementById('wphiTx');
  phi.style.display='flex';
  tx.textContent = c+' 秒後自動繼續下一項';
  const iv = setInterval(()=>{
    c--;
    if(c<=0){
      clearInterval(iv);
      wgo(wcur+1);
      startWarm();
    }else{
      tx.textContent = c+' 秒後自動繼續下一項';
    }
  },1000);
  wtmr = iv; // so back/reset clears it
}
function wgo(i){
  if(i<0 || i>=WARM.length) return;
  clearTimers();
  wcur = i; wStep = 0; wFired={};
  render();
}
function wRst(){
  clearTimers();
  wStep = 0; wFired={}; delete wS[WARM[wcur].id];
  render();
}
function wFinish(){
  clearTimers();
  const app = document.getElementById('app');
  const mins = wSS ? Math.round((Date.now()-wSS)/60000) : 4;
  app.innerHTML = `<div class="card"><div class="done-scr">
    <div class="done-ic blue"><i class="ti ti-circle-check"></i></div>
    <h2>暖身完成 🎉</h2>
    <p>四項暖身都做完了，約 ${mins} 分鐘。<br>腳醒了，可以出發走路囉！</p>
    <button class="bres blue" onclick="setMode('warm')"><i class="ti ti-refresh"></i>再做一次</button>
    <div style="margin-top:14px"><button class="brst" style="display:inline-block;padding:10px 20px" onclick="backHome()">回首頁</button></div>
  </div></div>`;
}

/* ===================== REHAB MODULE ===================== */
function getVal(id,key){
  if(custom[id] && custom[id][key]!==undefined) return custom[id][key];
  if(key==='holdSec'){
    try{ const s=localStorage.getItem('holdSec_'+id); if(s!==null) return parseInt(s); }catch(e){}
  }
  if(key==='sets'){
    try{ const s=localStorage.getItem('sets_'+id); if(s!==null) return parseInt(s); }catch(e){}
  }
  return DEFAULTS.find(e=>e.id===id)[key];
}
function isModified(id){
  const d = DEFAULTS.find(e=>e.id===id);
  const sv = getVal(id,'sets'), hv = getVal(id,'holdSec');
  return sv!==d.sets || hv!==d.holdSec;
}
function rehabStepRow(){
  let h='<div class="steprow">';
  DEFAULTS.forEach((e,i)=>{
    let cls='';
    if(cS[e.id] && cS[e.id]>=getVal(e.id,'sets')) cls=' done';
    else if(i===rcur) cls=' cur';
    h += `<div class="sdot${cls}" onclick="rgo(${i})">
      <div class="sn">${i+1}</div><div class="sl">${e.title.slice(0,4)}</div></div>`;
    if(i<DEFAULTS.length-1) h += `<div class="sbar${(cS[e.id]&&cS[e.id]>=getVal(e.id,'sets'))?' done':''}"></div>`;
  });
  return h+'</div>';
}
function rehabHTML(){
  const ex = DEFAULTS[rcur];
  const done = cS[ex.id]||0;
  const sets = getVal(ex.id,'sets');
  const hold = getVal(ex.id,'holdSec');
  const modS = isModified(ex.id);
  return `<div class="hdr">
    <button class="hdr-back" onclick="backHome()"><i class="ti ti-chevron-left"></i></button>
    <div class="hic green"><i class="ti ti-activity-heartbeat"></i></div>
    <div class="htx"><h1>垂足背屈復健</h1><p>第 ${rcur+1} / ${DEFAULTS.length} 動作 · ${ex.badge}</p></div>
  </div>
  ${rehabStepRow()}
  ${voiceRow(false)}
  <div class="card">
    <div class="ctop"><div class="cnum">${rcur+1}</div>
      <div class="ct">${ex.title}</div><div class="cbdg">${ex.badge}</div></div>
    <div class="cbody">
      <div class="illus-wrap">${IMGS[ex.id]}</div>
      ${REHAB_LEGEND}
      <div class="inst">${ex.inst}</div>
      <div class="chips">
        <div class="chip"><div class="chip-label">組數</div>
          <div class="stepper">
            <button class="stp-btn" onclick="updateChip('${ex.id}','sets',-1,1,6)">−</button>
            <span class="stp-val" id="chipSets">${sets}</span>
            <button class="stp-btn" onclick="updateChip('${ex.id}','sets',1,1,6)">＋</button>
          </div></div>
        <div class="chip"><div class="chip-label">維持秒數</div>
          <div class="stepper">
            <button class="stp-btn" onclick="updateChip('${ex.id}','holdSec',-1,3,30)">−</button>
            <span class="stp-val" id="chipHold">${hold}</span>
            <button class="stp-btn" onclick="updateChip('${ex.id}','holdSec',1,3,30)">＋</button>
          </div></div>
        <div class="chip"><div class="chip-label">已完成</div>
          <div class="chip-val" id="chipDone">${done}/${sets}</div></div>
      </div>
      ${ex.reps?`<div class="tip"><i class="ti ti-repeat"></i><span>建議每組 ${ex.reps} 下；「維持秒數」為每下停留時間。</span></div>`:''}
      <div class="phi" id="rphi"><span class="phd"></span><span id="rphiTx"></span></div>
      <div class="twrap" id="rtwrap" style="display:none">${ringSVG(false)}</div>
      <div class="dban green" id="rdban"></div>
      <div class="btns">
        <button class="bgo green" id="rgoBtn" onclick="startEx()"><i class="ti ti-player-play"></i>${done>=sets?'已完成':'開始第 '+(done+1)+' 組'}</button>
        <button class="brst" onclick="rRst()">重來</button>
      </div>
      <div class="nav">
        <button class="npv" onclick="rgo(${rcur-1})" ${rcur===0?'disabled':''}><i class="ti ti-chevron-left"></i>上一個</button>
        <button class="nnx green" onclick="rgo(${rcur+1})" ${rcur===DEFAULTS.length-1?'disabled':''}>下一個<i class="ti ti-chevron-right"></i></button>
      </div>
    </div>
  </div>`;
}
function updateChip(id,key,delta,min,max){
  if(!custom[id]) custom[id]={};
  const nv = Math.max(min, Math.min(max, getVal(id,key)+delta));
  custom[id][key]=nv;
  try{ localStorage.setItem(key+'_'+id, nv); }catch(e){}
  // patch DOM
  if(key==='sets'){ const el=document.getElementById('chipSets'); if(el) el.textContent=nv; }
  if(key==='holdSec'){ const el=document.getElementById('chipHold'); if(el) el.textContent=nv; }
  const cd = document.getElementById('chipDone');
  if(cd) cd.textContent = (cS[id]||0)+'/'+getVal(id,'sets');
  const btn = document.getElementById('rgoBtn');
  const done = cS[id]||0, sets=getVal(id,'sets');
  if(btn && !tmr) btn.innerHTML = `<i class="ti ti-player-play"></i>${done>=sets?'已完成':'開始第 '+(done+1)+' 組'}`;
}
function startEx(){
  const ex = DEFAULTS[rcur];
  const sets = getVal(ex.id,'sets');
  const done = cS[ex.id]||0;
  if(done>=sets) return;
  const btn = document.getElementById('rgoBtn');
  if(btn) btn.disabled=true;
  document.getElementById('rtwrap').style.display='block';
  spk(ex.vc.s);
  setTimeout(()=> runSet(ex.id, ex, done+1), 1400);
}
function runSet(id, ex, n){
  const hold = getVal(id,'holdSec');
  let rem = hold;
  const ring = document.getElementById('ring');
  const num = document.getElementById('rnum');
  const phi = document.getElementById('rphi');
  const ptx = document.getElementById('rphiTx');
  const sets = getVal(id,'sets');
  phi.style.display='flex';
  phi.querySelector('.phd').classList.remove('rest');
  if(ring) ring.classList.remove('rest');
  ptx.textContent = `第 ${n} / ${sets} 組 · 維持中`;
  if(num) num.textContent = rem;
  if(ring){ ring.style.strokeDashoffset=0; }
  tmr = setInterval(()=>{
    rem--;
    if(num) num.textContent = Math.max(rem,0);
    if(ring) ring.style.strokeDashoffset = C42*(1 - Math.max(rem,0)/hold);
    if(rem === Math.floor(hold/2)) spk(ex.vc.m);
    if(rem<=0){
      clearInterval(tmr); tmr=null;
      cS[id] = (cS[id]||0)+1; totS++;
      const cd=document.getElementById('chipDone'); if(cd) cd.textContent=cS[id]+'/'+sets;
      if(cS[id] >= sets){
        mkDone(sets);
      }else{
        spk(ex.vc.e);
        runRest(id, ex, n+1, getVal(id,'holdSec') ? ex.restSec : ex.restSec);
      }
    }
  },1000);
}
function runRest(id, ex, nxt, rs){
  let rem = rs;
  const ring = document.getElementById('ring');
  const num = document.getElementById('rnum');
  const phi = document.getElementById('rphi');
  const ptx = document.getElementById('rphiTx');
  phi.querySelector('.phd').classList.add('rest');
  if(ring) ring.classList.add('rest');
  ptx.textContent = `休息 · 第 ${nxt} 組即將開始`;
  if(num) num.textContent = rem;
  if(ring){ ring.style.strokeDashoffset=0; }
  tmr = setInterval(()=>{
    rem--;
    if(num) num.textContent = Math.max(rem,0);
    if(ring) ring.style.strokeDashoffset = C42*(1 - Math.max(rem,0)/rs);
    if(rem<=0){
      clearInterval(tmr); tmr=null;
      spk('休息結束，開始第 '+nxt+' 組');
      runSet(id, ex, nxt);
    }
  },1000);
}
function mkDone(sets){
  const ex = DEFAULTS[rcur];
  spk(ex.vc.e);
  const dban = document.getElementById('rdban');
  if(dban){ dban.style.display='block'; dban.textContent='✓ '+ex.title+' 完成（'+sets+' 組）'; }
  const ring = document.getElementById('ring');
  if(ring) ring.classList.remove('rest');
  document.getElementById('rtwrap').style.display='none';
  const btn = document.getElementById('rgoBtn');
  if(btn){ btn.disabled=false; btn.innerHTML='<i class="ti ti-circle-check"></i>已完成'; }
  // update step row
  document.querySelectorAll('.steprow .sdot').forEach((d,i)=>{ if(i===rcur){d.classList.remove('cur');d.classList.add('done');} });
  if(rcur < DEFAULTS.length-1 && !isModified(ex.id)){
    autoNext();
  }else if(rcur < DEFAULTS.length-1){
    const ptx=document.getElementById('rphiTx');
    document.getElementById('rphi').style.display='flex';
    ptx.textContent='已完成，按「下一個」繼續';
  }else{
    setTimeout(finishAll, 1500);
  }
}
function autoNext(){
  let c = 15;
  const phi = document.getElementById('rphi');
  const ptx = document.getElementById('rphiTx');
  phi.style.display='flex';
  phi.querySelector('.phd').classList.add('rest');
  ptx.textContent = c+' 秒後自動進入下一個動作';
  tmr = setInterval(()=>{
    c--;
    if(c<=0){
      clearInterval(tmr); tmr=null;
      rgo(rcur+1);
      startEx();
    }else{
      ptx.textContent = c+' 秒後自動進入下一個動作';
    }
  },1000);
}
function rgo(i){
  if(i<0 || i>=DEFAULTS.length) return;
  clearTimers();
  rcur = i;
  render();
}
function rRst(){
  clearTimers();
  delete cS[DEFAULTS[rcur].id];
  render();
}
function finishAll(){
  clearTimers();
  const app = document.getElementById('app');
  const mins = ss ? Math.round((Date.now()-ss)/60000) : 0;
  app.innerHTML = `<div class="card"><div class="done-scr">
    <div class="done-ic green"><i class="ti ti-circle-check"></i></div>
    <h2>復健完成 💪</h2>
    <p>五個動作全部做完，共 ${totS} 組${mins?('，約 '+mins+' 分鐘'):''}。<br>持之以恆，右腳背屈會越來越有力！</p>
    <button class="bres green" onclick="setMode('rehab')"><i class="ti ti-refresh"></i>再做一次</button>
    <div style="margin-top:14px"><button class="brst" style="display:inline-block;padding:10px 20px" onclick="backHome()">回首頁</button></div>
  </div></div>`;
}

/* ===================== INIT ===================== */
render();
window.addEventListener('pagehide', clearTimers);
</script>
</body>
</html>
